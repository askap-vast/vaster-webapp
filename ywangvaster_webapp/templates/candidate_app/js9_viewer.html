<html>

    body { margin: 0; padding: 0; background: #000; }

</head>
<body>
  <div class="JS9Menubar"></div>
  <div class="JS9" data-width="500px" data-height="500px"></div>

    JS9.Preload('{{ fits_url }}');
  </script>
  {% endif %}

</html>
