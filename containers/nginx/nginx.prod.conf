upstream ywangvaster {
    server web:80;
}

server {
    listen 80;
    server_name vaster.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name vaster.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/vaster.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vaster.duckdns.org/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 500M;

    location / {
        proxy_pass http://ywangvaster;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location /static/ {
        alias /ywangvaster_staticfiles/;
    }

    location /media/ {
        alias /ywangvaster_media/;
    }
}
